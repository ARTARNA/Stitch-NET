name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build --configuration Release

      - name: Pack
        run: |
          dotnet pack src/Stitch.Core/Stitch.Core.csproj \
            --configuration Release \
            --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./nupkgs

          dotnet pack src/Stitch.Generator/Stitch.Generator.csproj \
            --configuration Release \
            --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./nupkgs

          dotnet pack src/Stitch.Analyzers/Stitch.Analyzers.csproj \
            --configuration Release \
            --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./nupkgs

          dotnet pack src/Stitch.AspNetCore/Stitch.AspNetCore.csproj \
            --configuration Release \
            --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./nupkgs

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
